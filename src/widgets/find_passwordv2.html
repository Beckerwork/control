<div class="alert alert-info" style="border-radius: 10px; position: relative; padding: 24px 32px 20px 32px; margin-top: 25px; border: 4px solid #31708f; max-width: 420px; margin-left: auto; margin-right: auto;">
  <span style="position: absolute; top: -28px; left: 16px; background-color: #31708f; color: white; border-radius: 50%; width: 56px; height: 56px; display: inline-flex; align-items: center; justify-content: center; font-size: 28px;">
    <i class="fa fa-lock"></i>
  </span>
  <div style="text-align:center; margin-bottom:16px;">
    <h3 style="color:#31708f; margin:0 0 6px 0;">🔐 Zugang zum Serverraum</h3>
    <p style="margin:0; color:#31708f; font-size:14px;">
      Gebt das Codewort ein, um die Tür zu öffnen:
    </p>
  </div>
  <hr style="border:none; border-top:1px solid #31708f; opacity:0.3; margin-bottom:16px;">
  <div style="display:flex; flex-direction:column; align-items:center; gap:10px;">
    <input id="pw3-input" type="password" placeholder="Codewort eingeben …" style="border:1.5px solid #31708f; border-radius:6px; padding:7px 12px; font-size:14px; width:280px; outline:none; background:white;">
    <div style="display:flex; align-items:center; gap:8px;">
      <input type="checkbox" id="pw3-show" style="cursor:pointer;">
      <label for="pw3-show" style="color:#31708f; font-size:13px; cursor:pointer;">Passwort anzeigen</label>
    </div>
    <button id="pw3-btn" style="background-color:#31708f; color:white; border:none; border-radius:6px; padding:9px 28px; font-weight:bold; font-size:14px; cursor:pointer; letter-spacing:0.3px;">Bestätigen</button>
    <p id="pw3-feedback" style="margin:0; font-weight:bold; font-size:15px; text-align:center;"></p>
  </div>
  <div id="pw3-nav" style="display:none; margin-top:16px; text-align:center;">
    <a href="story_game_2.ipynb" target="_self" style="display:inline-block; padding:10px 24px; border-radius:8px; border:3px solid #31708f; background-color:#beeaf1; color:#31708f; text-decoration:none; font-weight:bold; box-shadow:0 2px 6px rgba(0,0,0,0.15);">In den Serverraum &nbsp;<i class="fa fa-arrow-right"></i></a>
  </div>
</div>

<script>
setTimeout(function() {
  var input = document.getElementById("pw3-input");
  var btn = document.getElementById("pw3-btn");
  var showCb = document.getElementById("pw3-show");
  var feedback = document.getElementById("pw3-feedback");
  var nav = document.getElementById("pw3-nav");

  // Das Zielwort im Klartext (wird beim Vergleich normalisiert)
  var targetWord = "machinelearning";

  showCb.addEventListener("change", function() {
    input.type = this.checked ? "text" : "password";
  });

  function checkPassword() {
    // Eingabe säubern: Kleinschreibung + Leerzeichen/Bindestriche weg
    var cleanValue = input.value.toLowerCase().replace(/[\s-]/g, '');

    if (cleanValue === targetWord) {
      feedback.style.color = "#3c763d";
      feedback.textContent = "✅ Passwort korrekt! Zugriff gewährt.";
      nav.style.display = "block";
    } else {
      feedback.style.color = "#a94442";
      feedback.textContent = "❌ Falsches Passwort! Zugriff verweigert.";
      nav.style.display = "none";
    }
  }

  btn.onclick = checkPassword;
  input.addEventListener("keydown", function(e) {
    if (e.key === "Enter") checkPassword();
  });
}, 100);
</script>
